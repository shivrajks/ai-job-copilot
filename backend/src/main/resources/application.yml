spring:
  application:
    name: ai-job-copilot

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aicopilot}
    username: ${DB_USERNAME:aicopilot}
    password: ${DB_PASSWORD:aicopilot}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true

# JWT Configuration
jwt:
  # For production: set JWT_SECRET to a non-default 256-bit+ signing secret.
  # For local dev: the default below is safe (never use in production).
  secret: ${JWT_SECRET:dev-jwt-secret-key-ai-copilot-2024-at-least-256-bits-long!!}
  access-token-expiration: 900000    # 15 minutes
  refresh-token-expiration: 604800000 # 7 days

# AI Configuration
ai:
  provider: ${AI_PROVIDER:mock}

# Gemini AI Configuration
gemini:
  api-key: ${GEMINI_API_KEY:}
  flash-model: gemini-2.0-flash
  pro-model: gemini-1.5-pro

# Auth Security
auth:
  lockout:
    max-attempts: 5
    duration-minutes: 15

# Rate Limiting
rate-limit:
  auth:
    max-requests: 10
    window-minutes: 1
  free-tier:
    requests-per-month: 5
  pro-tier:
    requests-per-month: 10000

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Application
app:
  base-url: ${APP_BASE_URL:http://localhost:3000}

# Resume Storage
resume:
  storage:
    path: ${RESUME_STORAGE_PATH:./uploads/resumes}
  max-file-size: 5242880  # 5MB in bytes

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.aicopilot: DEBUG
    org.springframework.security: INFO
